<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1060" viewBox="0 0 1760 1060">
  <defs>
    <marker id="arrowCluster" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35506b"/>
    </marker>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #d6e0ea; stroke-width: 2; }
      .cluster { fill: #f7fbff; stroke: #93b1cc; stroke-width: 4; stroke-dasharray: 14 10; }
      .road { fill: #dbe7f1; stroke: #9db4c8; stroke-width: 4; }
      .dock { fill: #ffd79a; stroke: #cd9547; stroke-width: 4; }
      .wait { fill: #d8efc9; stroke: #78a75d; stroke-width: 4; }
      .entry { fill: #eef4f9; stroke: #b7c9d8; stroke-width: 4; }
      .conflict { fill: #ffd8d2; stroke: #d26c58; stroke-width: 4; stroke-dasharray: 10 8; }
      .agvA1 { fill: #2e7dd1; stroke: #174a82; stroke-width: 4; }
      .agvA2 { fill: #8b5cf6; stroke: #5a31aa; stroke-width: 4; }
      .agvB1 { fill: #16a34a; stroke: #0c6b30; stroke-width: 4; }
      .agvB2 { fill: #f97316; stroke: #a74b10; stroke-width: 4; }
      .path { fill: none; stroke: #35506b; stroke-width: 8; marker-end: url(#arrowCluster); }
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1c2a36; }
      .subtitle { font: 600 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2c4255; }
      .label { font: 600 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #233340; }
      .body { font: 500 19px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #446076; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="1760" height="1060" class="bg"/>
  <text x="880" y="58" text-anchor="middle" class="title">情况 2：相邻双月台四车协同调度的俯视示意图</text>

  <rect x="60" y="100" width="1160" height="900" rx="24" class="panel"/>
  <rect x="1250" y="100" width="450" height="900" rx="24" class="panel"/>

  <text x="640" y="145" text-anchor="middle" class="subtitle">DockCluster 俯视区域</text>
  <text x="1475" y="145" text-anchor="middle" class="subtitle">调度说明</text>

  <rect x="120" y="180" width="1040" height="720" rx="24" class="cluster"/>
  <text x="640" y="220" text-anchor="middle" class="label">月台 A 与月台 B 周边共享调度区域</text>

  <rect x="200" y="790" width="880" height="90" rx="18" class="road"/>
  <text x="640" y="845" text-anchor="middle" class="label">Cluster 外主通道</text>

  <rect x="280" y="280" width="240" height="95" rx="16" class="dock"/>
  <rect x="760" y="280" width="240" height="95" rx="16" class="dock"/>
  <text x="400" y="338" text-anchor="middle" class="label">月台 A</text>
  <text x="880" y="338" text-anchor="middle" class="label">月台 B</text>

  <rect x="350" y="510" width="170" height="100" rx="16" class="wait"/>
  <rect x="760" y="510" width="170" height="100" rx="16" class="wait"/>
  <text x="435" y="570" text-anchor="middle" class="label">等待位 WA1</text>
  <text x="845" y="570" text-anchor="middle" class="label">等待位 WB1</text>

  <rect x="560" y="610" width="160" height="76" rx="16" class="entry"/>
  <text x="640" y="657" text-anchor="middle" class="label">入口 E</text>

  <rect x="500" y="410" width="280" height="130" rx="18" class="conflict"/>
  <text x="640" y="468" text-anchor="middle" class="label">共享冲突区 X</text>
  <text x="640" y="500" text-anchor="middle" class="body">交叉转弯 / 会车点 / 关键路权</text>

  <rect x="300" y="805" width="96" height="58" rx="14" class="agvA1"/>
  <rect x="440" y="805" width="96" height="58" rx="14" class="agvA2"/>
  <rect x="760" y="805" width="96" height="58" rx="14" class="agvB1"/>
  <rect x="900" y="805" width="96" height="58" rx="14" class="agvB2"/>
  <text x="348" y="842" text-anchor="middle" class="label white">A1</text>
  <text x="488" y="842" text-anchor="middle" class="label white">A2</text>
  <text x="808" y="842" text-anchor="middle" class="label white">B1</text>
  <text x="948" y="842" text-anchor="middle" class="label white">B2</text>

  <path d="M 348 805 C 410 760 510 710 620 686" class="path"/>
  <path d="M 488 805 C 488 740 475 680 435 610" class="path"/>
  <path d="M 808 805 C 770 760 715 720 660 686" class="path"/>
  <path d="M 948 805 C 920 740 900 690 845 610" class="path"/>

  <path d="M 640 610 L 640 542" class="path"/>
  <path d="M 595 410 C 545 385 495 370 455 375" class="path"/>
  <path d="M 685 410 C 745 385 810 370 880 375" class="path"/>

  <text x="260" y="735" class="body">A1：优先放行，先进入入口 E，再申请共享冲突区 X。</text>
  <text x="260" y="763" class="body">A2：先进入 WA1 等待，不立即进入核心冲突区。</text>
  <text x="720" y="735" class="body">B1：暂缓进入 X，等待 A1 占用完成或释放关键路权。</text>
  <text x="720" y="763" class="body">B2：保留在 Cluster 外队列，不直接压向入口。</text>

  <text x="1290" y="220" class="label">这个图重点表达什么</text>
  <text x="1290" y="262" class="body">1. 不能只看月台 A/B 是否空闲，</text>
  <text x="1315" y="290" class="body">还要看入口 E 和共享冲突区 X。</text>
  <text x="1290" y="330" class="body">2. 四辆车不能一起冲进相邻月台区域，</text>
  <text x="1315" y="358" class="body">否则容易在交叉点附近形成互锁。</text>
  <text x="1290" y="398" class="body">3. 等待位 WA1 / WB1 的作用是承接</text>
  <text x="1315" y="426" class="body">暂未放行的车辆，避免堵住主通道。</text>

  <text x="1290" y="520" class="label">推荐放行顺序示例</text>
  <text x="1290" y="562" class="body">- 第 1 步：放行 A1</text>
  <text x="1290" y="596" class="body">- 第 2 步：A2 进入 WA1，B1 暂缓</text>
  <text x="1290" y="630" class="body">- 第 3 步：A1 通过关键区后，</text>
  <text x="1315" y="658" class="body">再评估是否放行 B1 或 A2</text>
  <text x="1290" y="692" class="body">- 第 4 步：B2 继续保留在外部队列</text>

  <text x="1290" y="790" class="label">适合放进调度规则的判断项</text>
  <text x="1290" y="832" class="body">- Cluster 最大并发进入数</text>
  <text x="1290" y="866" class="body">- 入口 E 是否允许继续放行</text>
  <text x="1290" y="900" class="body">- 共享冲突区 X 当前是否被占用</text>
  <text x="1290" y="934" class="body">- 等待位是否可接纳新车</text>
</svg>
